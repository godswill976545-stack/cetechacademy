<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-brand-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.convex.dev wss://*.convex.dev https://*.convex.cloud wss://*.convex.cloud https://*.convex.site;">
    <title>Sign Up | CeTech Academy</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="src/tailwind.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased bg-brand-950 text-slate-200 selection:bg-accent-400/30 selection:text-white min-h-screen flex items-center justify-center p-4">

    <!-- Aurora background (animated gradient) -->
    <div class="fixed inset-0 pointer-events-none z-0 opacity-70">
        <div id="aurora-bg" class="absolute inset-0"></div>
        <div class="absolute inset-0 bg-brand-950/40"></div>
    </div>

    <!-- Ambient Background Lighting -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="ambient-orb bg-brand-400/10 w-[600px] h-[600px] -top-48 -left-24 animate-pulse-glow"></div>
        <div class="ambient-orb bg-accent-200/5 w-[800px] h-[800px] -bottom-48 -right-24"></div>
    </div>

    <main class="glass-panel rounded-3xl p-8 w-full max-w-md relative animate-fade-in border-slate-800 shadow-2xl">

        <header class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center justify-center gap-3 mb-6 group">
                <img src="/assets/logo.png" alt="CeTech Academy Logo" width="96" height="96" class="h-16 md:h-24 w-auto object-contain drop-shadow-[0_0_15px_rgba(0,123,255,0.1)] transition-transform duration-300 group-hover:scale-105" fetchpriority="high">
                <span class="text-3xl font-bold tracking-tight text-white group-hover:text-accent-400 transition-colors">CeTech Academy</span>
            </a>
            <h1 class="text-2xl font-bold text-white mb-2" id="formTitle">Create Account</h1>
            <p class="text-slate-400 text-sm" id="formSubtitle">Join the next generation of digital architects</p>
        </header>

        <form id="authForm" class="space-y-5">
            <div id="nameField">
                <label for="fullName" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Full Name</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="John Doe"
                        class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none"
                    >
                </div>
            </div>
            <div>
                <label for="email" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        required
                        class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none"
                    >
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                        class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none"
                    >
                    <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-brand-400 transition-colors" aria-label="Toggle password visibility">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label for="rememberMe" class="flex items-center gap-2 cursor-pointer group">
                    <input id="rememberMe" type="checkbox" class="w-4 h-4 rounded border-slate-700 bg-slate-900 text-brand-600 focus:ring-brand-500 focus:ring-offset-0">
                    <span class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors">Remember me</span>
                </label>
                <button type="button" class="text-sm text-brand-400 hover:text-brand-300 transition-colors bg-transparent border-none cursor-pointer p-0 font-medium">Forgot password?</button>
            </div>

            <button type="submit" id="submitBtn" class="duo-btn duo-btn-primary w-full py-4 rounded-xl text-white font-bold uppercase tracking-widest" aria-live="polite">
                <i data-lucide="user-plus" class="w-5 h-5 transition-transform" id="btnIcon"></i>
                <span id="btnText">Create Account</span>
            </button>
        <div id="authFeedback" class="auth-feedback" aria-live="assertive"></div>

        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-400 text-sm">
                <span id="toggleText">Already have an account?</span>
                <a href="login.html" id="toggleMode" class="text-brand-400 hover:text-brand-300 font-medium transition-colors">Sign In</a>
            </p>
        </div>

        <div class="mt-6 pt-6 border-t border-slate-800">
            <a href="index.html" class="flex items-center justify-center gap-2 text-slate-500 hover:text-brand-400 transition-colors text-sm font-medium">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Home
            </a>
        </div>
    </div>

    </main>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            if (window.initIcons) window.initIcons();
        });

    </script>
    <script type="module" src="main.js"></script>
    <script type="module" src="BorderGlowMount.jsx"></script>
    <script type="module" src="AuroraMount.jsx"></script>
</body>
</html>
