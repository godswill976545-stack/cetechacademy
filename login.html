<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">
    <title>Login | CeTech Academy</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="src/tailwind.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <!-- Aurora background (animated gradient) -->
    <div class="fixed inset-0 pointer-events-none z-0 opacity-70">
        <div id="aurora-bg" class="absolute inset-0"></div>
        <div class="absolute inset-0 bg-white/40"></div>
    </div>

    <!-- Ambient Background Lighting -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="ambient-orb bg-[#007bff]/10 w-[600px] h-[600px] -top-48 -left-24 animate-pulse-glow"></div>
        <div class="ambient-orb bg-[#00d2ff]/5 w-[800px] h-[800px] -bottom-48 -right-24"></div>
    </div>

    <main class="glass-card rounded-3xl p-8 w-full max-w-md relative animate-fade-in">
        
        <header class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center justify-center gap-3 mb-6 group">
                <img src="assets/logo.png" alt="CeTech Academy Logo" width="96" height="96" class="h-16 md:h-24 w-auto object-contain drop-shadow-[0_0_15px_rgba(0,123,255,0.1)] transition-transform duration-300 group-hover:scale-105" fetchpriority="high">
                <span class="text-3xl font-bold tracking-tight text-slate-900 group-hover:text-[#007bff] transition-colors">CeTech Academy</span>
            </a>
            <h1 class="text-2xl font-bold text-slate-900 mb-2" id="formTitle">Welcome Back</h1>
            <p class="text-slate-500 text-sm" id="formSubtitle">Sign in to continue your learning journey</p>
        </header>

        <form id="loginForm" class="space-y-5">
            <div id="nameField" class="hidden">
                <label for="fullName" class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input 
                        type="text" 
                        id="fullName"
                        placeholder="John Doe"
                        class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-slate-900 placeholder-slate-400"
                    >
                </div>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input 
                        type="email" 
                        id="email"
                        placeholder="you@example.com"
                        required
                        class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-slate-900 placeholder-slate-400"
                    >
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input 
                        type="password" 
                        id="password"
                        placeholder="Enter your password"
                        required
                        class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-slate-900 placeholder-slate-400"
                    >
                    <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-600 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label for="rememberMe" class="flex items-center gap-2 cursor-pointer">
                    <input id="rememberMe" type="checkbox" class="w-4 h-4 rounded border-slate-300 bg-transparent text-brand-600 focus:ring-brand-500 focus:ring-offset-0">
                    <span class="text-sm text-slate-500">Remember me</span>
                </label>
                <a href="#" class="text-sm text-brand-600 hover:text-brand-700 transition-colors">Forgot password?</a>
            </div>

            <button type="submit" id="submitBtn" class="duo-btn duo-btn-primary w-full" aria-live="polite">
                <i data-lucide="log-in" class="w-5 h-5 transition-transform" id="btnIcon"></i>
                <span id="btnText">Sign In</span>
            </button>
            <div id="authFeedback" class="auth-feedback" aria-live="assertive"></div>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white/80 backdrop-blur-sm text-slate-500">Or continue with</span>
                </div>
            </div>

            <button type="button" id="googleAuthBtn" class="duo-btn duo-btn-secondary w-full flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-sm">
                <span id="toggleText">Don't have an account?</span> 
                <a href="#" id="toggleMode" class="text-brand-600 hover:text-brand-700 font-medium transition-colors">Create Account</a>
            </p>
        </div>

        <div class="mt-6 pt-6 border-t border-slate-100">
            <a href="index.html" class="flex items-center justify-center gap-2 text-slate-400 hover:text-brand-600 transition-colors text-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Home
            </a>
        </div>
    </div>

    </main>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            if (window.initIcons) window.initIcons();
        });

        // Toggle Login/Sign Up mode
        const toggleMode = document.getElementById('toggleMode');
        const nameField = document.getElementById('nameField');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const btnText = document.getElementById('btnText');
        const toggleText = document.getElementById('toggleText');
        const btnIcon = document.getElementById('btnIcon');

        // Initial state
        let isSignUp = false;

        function updateModeUI() {
            if (isSignUp) {
                nameField.classList.remove('hidden');
                formTitle.textContent = 'Create Account';
                formSubtitle.textContent = 'Join the next generation of digital architects';
                btnText.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account?';
                toggleMode.textContent = 'Sign In';
                btnIcon.setAttribute('data-lucide', 'user-plus');
            } else {
                nameField.classList.add('hidden');
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'Sign in to continue your learning journey';
                btnText.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleMode.textContent = 'Create Account';
                btnIcon.setAttribute('data-lucide', 'log-in');
            }
            if (window.initIcons) window.initIcons();
        }

        toggleMode.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUp = !isSignUp;
            updateModeUI();
        });

        // Expose a way for external scripts to set the mode
        window.setAuthMode = (mode) => {
            isSignUp = (mode === 'signup');
            updateModeUI();
        };
    </script>
    <script type="module" src="main.js"></script>
    <script type="module" src="BorderGlowMount.jsx"></script>
    <script type="module" src="AuroraMount.jsx"></script>
</body>
</html>
