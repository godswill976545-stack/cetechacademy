<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-brand-950 text-slate-200">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.paystack.co https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.convex.dev wss://*.convex.dev https://*.convex.cloud wss://*.convex.cloud https://*.convex.site https://api.paystack.co;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/tailwind.css">
    <link rel="stylesheet" href="../style.css">
    <title>Checkout | CeTech Academy</title>
    <!-- Paystack Checkout Script -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="antialiased bg-brand-950 text-slate-200 selection:bg-accent-400/30 selection:text-white">
    <!-- Aurora background -->
    <div class="fixed inset-0 pointer-events-none z-0 opacity-70">
        <div id="aurora-bg" class="absolute inset-0"></div>
        <div class="absolute inset-0 bg-brand-950/40"></div>
    </div>

    <!-- Ambient Background Lighting -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="ambient-orb bg-brand-400/20 w-[600px] h-[600px] -top-48 -left-24 animate-pulse-glow"></div>
        <div class="ambient-orb bg-accent-200/10 w-[800px] h-[800px] -bottom-48 -right-24"></div>
    </div>

    <header class="fixed top-0 left-0 right-0 z-50 glass-nav">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between" aria-label="Payment navigation">
            <a href="../index.html" class="flex items-center gap-3 group">
                <img src="../assets/logo.png" alt="CeTech Academy" class="h-10 w-auto transition-transform duration-300 group-hover:scale-105">
                <span class="text-xl font-bold tracking-tight text-white group-hover:text-accent-400 transition-colors">CeTech Academy</span>
            </a>
            <a href="../index.html" class="text-sm font-medium text-slate-400 hover:text-accent-400 transition-colors">Back to Home</a>
        </nav>
    </header>

    <main class="relative z-10 min-h-screen flex items-center justify-center p-6 pt-32 pb-20">
        <div class="glass-panel rounded-3xl p-8 w-full max-w-lg border-slate-800 shadow-2xl animate-fade-in">
            <header class="text-center mb-10">
                <h2 class="text-3xl font-bold text-white mb-2">Complete Enrollment</h2>
                <p class="text-slate-400 text-sm">Please enter your details to proceed with the payment.</p>
            </header>

            <div class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="input-group">
                        <label for="firstname" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">First Name</label>
                        <input type="text" id="firstname" placeholder="John" required
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none">
                    </div>
                    <div class="input-group">
                        <label for="lastname" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Last Name</label>
                        <input type="text" id="lastname" placeholder="Doe" required
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required
                           class="input-field w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none">
                </div>

                <div class="input-group">
                    <label for="course-select" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Select Your Course</label>
                    <select id="course-select"
                            class="input-field w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:border-brand-500 transition-all outline-none appearance-none cursor-pointer">
                        <option value="digital-marketing" data-price="130000">Digital Marketing - ₦130,000</option>
                        <option value="ui-ux-design" data-price="150000">UI/UX Design - ₦150,000</option>
                        <option value="software-engineering" data-price="200000">Software Engineering - ₦200,000</option>
                        <option value="ai-automation" data-price="180000">AI Automation - ₦180,000</option>
                        <option value="data-analyst" data-price="200000">Data Analyst - ₦200,000</option>
                        <option value="graphic-design" data-price="120000">Graphic Design - ₦120,000</eoption>
                        <option value="pro-launch" data-price="100000">CeTech Pro Launch - ₦100,000</option>
                    </select>
                </div>

                <div class="glass-panel rounded-2xl p-6 border-slate-800 bg-slate-900/30">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm text-slate-500">Course Tuition</span>
                        <span id="display-price" class="text-sm font-bold text-white">₦130,000</span>
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-slate-800">
                        <span class="text-base font-bold text-white">Total Due</span>
                        <span id="display-total" class="text-xl font-bold text-brand-400">₦130,000</span>
                    </div>
                </div>

                <button id="pay-btn" class="duo-btn duo-btn-primary w-full py-4 rounded-xl text-white font-bold uppercase tracking-widest">
                    Pay with Paystack
                </button>

                <div class="relative py-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-800"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase font-bold tracking-widest text-slate-500">
                        <span class="px-4 bg-brand-950">Or pay with crypto</span>
                    </div>
                </div>

                <div class="flex justify-center">
                    <a href="https://nowpayments.io/payment/?iid=6256773573&source=button" target="_blank" rel="noreferrer noopener" class="transition-transform hover:scale-105">
                        <img src="https://nowpayments.io/images/embeds/payment-button-white.svg" alt="Cryptocurrency payment button" style="width: 100%; max-width: 300px; border-radius: 12px;">
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="./payment.js"></script>
</body>
</html>
