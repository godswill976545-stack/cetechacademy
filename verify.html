<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-brand-950 text-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity | CeTech Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/tailwind.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .otp-input {
            width: 3.5rem;
            height: 4rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 123, 255, 0.2);
            color: white;
            transition: all 0.2s ease;
        }
        .otp-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            outline: none;
            transform: scale(1.05);
        }

        /* ===== DUOLINGO BUTTONS (DIRECT) ===== */
        .duo-btn {
            --btn-face: #007bff;
            --btn-shadow: #0056b3;
            --btn-text: #ffffff;
            --btn-radius: 14px;
            --btn-depth: 5px;

            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 12px 24px;
            background-color: var(--btn-face) !important;
            color: var(--btn-text) !important;
            border: none !important;
            border-bottom: var(--btn-depth) solid var(--btn-shadow) !important;
            border-radius: var(--btn-radius) !important;
            font-family: 'Space Grotesk', sans-serif !important;
            font-weight: 700 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            cursor: pointer !important;
            transition: all 0.1s ease !important;
            text-decoration: none !important;
            z-index: 100 !important;
        }

        .duo-btn:active {
            transform: translateY(4px) !important;
            border-bottom-width: 1px !important;
        }

        .duo-btn-primary { --btn-face: #007bff; --btn-shadow: #0056b3; }
        .duo-btn-lg { padding: 16px 32px; font-size: 1rem; --btn-depth: 6px; }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-6 bg-brand-950">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,...')] opacity-30"></div>
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-500/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-accent-400/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <div class="relative z-10 max-w-md w-full text-center">
        <div class="mb-12 animate-slide-up">
            <div class="w-20 h-20 rounded-3xl bg-brand-500/10 flex items-center justify-center mx-auto mb-6 text-brand-400 border border-brand-500/20 shadow-inner">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-4 font-heading">Verify Your Account</h1>
            <p class="text-slate-400">We've sent a 6-digit verification code to your email. Please enter it below to gain access.</p>
        </div>

        <div class="glass-panel p-8 rounded-[2.5rem] border-brand-500/20 shadow-2xl animate-slide-up" style="animation-delay: 0.2s">
            <div class="flex justify-center gap-3 mb-10" id="otp-container">
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
            </div>

            <button id="verifyBtn" class="duo-btn duo-btn-lg duo-btn-primary w-full mb-6">
                Verify Identity
            </button>

            <p class="text-slate-500 text-sm mb-6">
                Didn't receive the code? 
                <a href="#" id="resendBtn" class="text-brand-400 hover:text-brand-300 font-bold underline underline-offset-4 transition-colors">Resend Code</a>
            </p>

            <div class="pt-6 border-t border-brand-500/10">
                <a href="index.html" id="cancelBtn" class="text-slate-500 hover:text-white text-xs transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i>
                    Back to Homepage / Start Over
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        lucide.createIcons();
        const CONVEX_URL = import.meta.env.VITE_CONVEX_URL || '';

        async function getConvex() {
            if (!CONVEX_URL) {
                alert('Configuration error. Please contact support.');
                return null;
            }
            const { ConvexClient } = await import('convex/browser');
            return new ConvexClient(CONVEX_URL);
        }

        const inputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        cancelBtn.addEventListener('click', (e) => {
            localStorage.removeItem('cetech_user');
            localStorage.removeItem('user_verified');
            localStorage.removeItem('pending_user_id');
            localStorage.removeItem('pending_user_email');
            localStorage.removeItem('otp_sent');
        });

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                
                // Auto-submit when last digit is entered
                const code = Array.from(inputs).map(i => i.value).join('');
                if (code.length === 6) {
                    handleVerify();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').slice(0, 6).split('');
                if (pasteData.length > 0) {
                    pasteData.forEach((char, i) => {
                        if (inputs[i]) {
                            inputs[i].value = char;
                        }
                    });
                    const nextIndex = Math.min(pasteData.length, inputs.length - 1);
                    inputs[nextIndex].focus();
                    
                    // Auto-submit after paste if 6 digits
                    if (pasteData.length === 6) {
                        handleVerify();
                    }
                }
            });
        });

        async function handleVerify() {
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length !== 6) {
                alert('Please enter the complete 6-digit code');
                return;
            }
            const userId = localStorage.getItem('pending_user_id');
            if (!userId) {
                alert('Session expired. Please login again.');
                window.location.href = 'login.html';
                return;
            }
            verifyBtn.innerText = 'Verifying...';
            verifyBtn.disabled = true;
            try {
                const client = await getConvex();
                if (!client) return;
                const result = await client.mutation('auth/mutations:verifyOTP', { userId, code });
                if (result.success) {
                    localStorage.setItem('user_verified', 'true');
                    window.location.href = 'frontend/portal.html';
                } else {
                    alert(result.error || 'Invalid code. Please try again.');
                }
            } catch (error) {
                alert(error.message || 'Network error. Please try again.');
            } finally {
                verifyBtn.innerText = 'Verify Identity';
                verifyBtn.disabled = false;
            }
        }

        async function handleResend() {
            const userId = localStorage.getItem('pending_user_id');
            const email = localStorage.getItem('pending_user_email');
            if (!userId || !email) {
                window.location.href = 'login.html';
                return;
            }
            resendBtn.innerText = 'Sending...';
            resendBtn.disabled = true;
            try {
                const client = await getConvex();
                if (!client) return;
                const result = await client.mutation('auth/mutations:resendOTP', { userId });
                if (result.success) {
                    alert('A new verification code has been sent to your email.');
                } else {
                    alert('Failed to resend code. Please try again later.');
                }
            } catch (error) {
                alert('Network error.');
            } finally {
                resendBtn.innerText = 'Resend Code';
                resendBtn.disabled = false;
            }
        }

        verifyBtn.addEventListener('click', handleVerify);
        resendBtn.addEventListener('click', handleResend);
    </script>
</body>
</html>
